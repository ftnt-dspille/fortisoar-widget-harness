<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FortiSOAR widget dev harness</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@3.4.1/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        margin: 0;
        background: #f5f6f8;
        color: #1b1f24;
      }
      body.theme-dark {
        background: #1b1f24;
        color: #dcdcdc;
      }
      body.theme-dark .harness-frame {
        background: #252526;
        border-color: #3c3c3c;
        color: #dcdcdc;
      }
      body.theme-dark .harness-empty {
        color: #9da5b4;
      }
      .harness-bar {
        background: #1b1f24;
        color: #eee;
        padding: 10px 16px;
        display: flex;
        gap: 12px;
        align-items: center;
        font-size: 13px;
        flex-wrap: wrap;
      }
      .harness-bar label {
        margin: 0;
        font-weight: normal;
        display: flex;
        gap: 6px;
        align-items: center;
      }
      .harness-bar input,
      .harness-bar select {
        background: #2b313a;
        color: #eee;
        border: 1px solid #3a4049;
        padding: 4px 8px;
        border-radius: 3px;
        font-size: 12px;
      }
      .harness-bar .spacer { flex: 1; }
      .harness-frame {
        background: #fff;
        margin: 16px;
        border: 1px solid #dfe3e8;
        border-radius: 4px;
        min-height: 500px;
      }
      .harness-empty {
        padding: 60px;
        text-align: center;
        color: #666;
        font-size: 14px;
      }
      .harness-toasts {
        position: fixed;
        top: 60px;
        right: 16px;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .harness-toast {
        padding: 8px 12px;
        border-radius: 3px;
        color: #fff;
        font-size: 12px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      }
      .harness-toast-success { background: #5cb85c; }
      .harness-toast-error   { background: #d9534f; }
      .harness-toast-warning { background: #f0ad4e; }
      .harness-toast-info    { background: #5bc0de; }
      .harness-json-view {
        background: #f7f7f9;
        border: 1px solid #e5e5e5;
        padding: 8px;
        font-size: 12px;
        max-height: 400px;
        overflow: auto;
        border-radius: 3px;
      }
      .harness-spinner { font-size: 22px; color: #555; }
      .harness-package-panel {
        background: #242932;
        color: #eee;
        padding: 10px 16px;
        display: none;
        gap: 10px;
        align-items: center;
        font-size: 12px;
        border-top: 1px solid #3a4049;
        flex-wrap: wrap;
      }
      .harness-package-panel.open { display: flex; }
      .harness-package-panel input {
        background: #2b313a;
        color: #eee;
        border: 1px solid #3a4049;
        padding: 4px 8px;
        border-radius: 3px;
        font-size: 12px;
        width: 100px;
      }
      .harness-package-panel .current-version {
        opacity: 0.75;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      .harness-package-panel .group {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      body.theme-light {
        background: #f5f6f8 !important;
        color: #1b1f24 !important;
      }
      body.theme-light .harness-bar {
        background: #f0f2f5;
        color: #1b1f24;
        border-bottom: 1px solid #d0d4da;
      }
      body.theme-light .harness-bar input,
      body.theme-light .harness-bar select {
        background: #ffffff;
        color: #1b1f24;
        border-color: #c0c5cc;
      }
      body.theme-light .harness-frame {
        background: #ffffff;
        border-color: #d0d4da;
      }
      body.theme-light .harness-package-panel {
        background: #e8eaed;
        color: #1b1f24;
        border-top-color: #c0c5cc;
      }
      body.theme-light .harness-package-panel input {
        background: #ffffff;
        color: #1b1f24;
        border-color: #c0c5cc;
      }
      body.theme-light .harness-empty {
        color: #555;
      }
      .muted-65 { color: rgba(0, 0, 0, 0.55); }
      body.theme-dark .muted-65 { color: rgba(220, 220, 220, 0.6); }
      .font-size-12 { font-size: 12px; }
      .font-size-16 { font-size: 16px; }
      .text-overflow { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .margin-chart { margin: 0; }
      .display-flex-space-between { display: flex; justify-content: space-between; align-items: center; }
      .position-relative { position: relative; }
      .position-absolute { position: absolute; }

      /* Context wrappers — applied to the widget mount per harness context. */
      .harness-frame.ctx-viewpanel #widget-host {
        max-width: 880px;
        margin: 0 auto;
        padding: 12px 16px;
      }
      .harness-frame.ctx-drawer {
        background: transparent;
        border: 0;
        margin: 0;
        min-height: 0;
        position: relative;
        height: 100vh;
      }
      .harness-frame.ctx-drawer #widget-host {
        position: fixed;
        top: 0;
        right: 0;
        width: 480px;
        height: 100vh;
        background: #fff;
        border-left: 1px solid #dfe3e8;
        box-shadow: -4px 0 14px rgba(0, 0, 0, 0.18);
        overflow: auto;
        padding: 16px;
        z-index: 50;
      }
      body.theme-dark .harness-frame.ctx-drawer #widget-host {
        background: #252526;
        border-left-color: #3c3c3c;
      }
      .harness-record-header {
        font-size: 12px;
        padding: 6px 12px;
        background: rgba(0, 0, 0, 0.05);
        border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        margin-bottom: 8px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      body.theme-dark .harness-record-header {
        background: rgba(255, 255, 255, 0.05);
        border-bottom-color: rgba(255, 255, 255, 0.1);
      }
      .harness-record-header .err { color: #d9534f; }

      /* Edit-config modal */
      .harness-modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        z-index: 100;
      }
      .harness-modal-backdrop.open { display: flex; align-items: flex-start; justify-content: center; }
      .harness-modal {
        margin-top: 60px;
        background: #fff;
        color: #1b1f24;
        width: 720px;
        max-width: 90vw;
        max-height: 80vh;
        overflow: auto;
        border-radius: 6px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        display: flex;
        flex-direction: column;
      }
      body.theme-dark .harness-modal { background: #252526; color: #dcdcdc; }
      .harness-modal-head {
        padding: 12px 16px;
        font-weight: 600;
        border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .harness-modal-body {
        padding: 16px;
        overflow: auto;
      }
      .harness-modal-foot {
        padding: 10px 16px;
        border-top: 1px solid rgba(0, 0, 0, 0.1);
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .harness-dvc { width: 100%; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; }

      /* Lint warning banner (non-blocking warnings live above the widget). */
      .harness-lint-warn {
        background: #fff3cd; border: 1px solid #ffe69c; color: #664d03;
        padding: 8px 12px; margin: 0 16px 8px; border-radius: 4px; font-size: 12px;
      }
      body.theme-dark .harness-lint-warn {
        background: #3a2f10; border-color: #6b5618; color: #f1d68a;
      }

      /* Bottom debug drawer. Holds Errors / Network / Console tabs. */
      .harness-drawer {
        position: fixed; left: 0; right: 0; bottom: 0; z-index: 200;
        background: #1b1f24; color: #dcdcdc; border-top: 1px solid #3a4049;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
        display: flex; flex-direction: column; max-height: 50vh;
        transform: translateY(calc(100% - 32px)); transition: transform 0.18s ease;
      }
      .harness-drawer.open { transform: translateY(0); }
      body.theme-light .harness-drawer { background: #f0f2f5; color: #1b1f24; border-top-color: #c0c5cc; }
      .harness-drawer-bar {
        display: flex; align-items: center; gap: 4px; padding: 4px 8px;
        cursor: pointer; user-select: none; height: 32px; box-sizing: border-box;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      body.theme-light .harness-drawer-bar { border-bottom-color: rgba(0,0,0,0.08); }
      .harness-drawer-tab {
        padding: 2px 10px; border-radius: 3px; cursor: pointer; font-size: 11px;
        opacity: 0.65; display: inline-flex; align-items: center; gap: 6px;
      }
      .harness-drawer-tab:hover { opacity: 1; }
      .harness-drawer-tab.active { background: rgba(255,255,255,0.08); opacity: 1; }
      body.theme-light .harness-drawer-tab.active { background: rgba(0,0,0,0.08); }
      .harness-drawer-badge {
        background: #d9534f; color: #fff; padding: 0 6px; border-radius: 8px;
        min-width: 16px; text-align: center; font-size: 10px; line-height: 14px;
      }
      .harness-drawer-badge.muted { background: #6c757d; }
      .harness-drawer-spacer { flex: 1; }
      .harness-drawer-action {
        background: transparent; color: inherit; border: 1px solid rgba(255,255,255,0.15);
        padding: 1px 8px; border-radius: 3px; font-size: 11px; cursor: pointer;
      }
      body.theme-light .harness-drawer-action { border-color: rgba(0,0,0,0.2); }
      .harness-drawer-body {
        overflow: auto; flex: 1; padding: 6px 8px; min-height: 220px;
        background: #14171c;
      }
      body.theme-light .harness-drawer-body { background: #fafbfc; }
      .harness-drawer-row {
        padding: 3px 6px; border-bottom: 1px solid rgba(255,255,255,0.04);
        white-space: pre-wrap; word-break: break-word; cursor: pointer;
      }
      body.theme-light .harness-drawer-row { border-bottom-color: rgba(0,0,0,0.06); }
      .harness-drawer-row.expanded { background: rgba(255,255,255,0.04); }
      body.theme-light .harness-drawer-row.expanded { background: rgba(0,0,0,0.04); }
      .harness-drawer-row .meta { opacity: 0.6; font-size: 11px; margin-right: 6px; }
      .harness-drawer-row .status-2xx { color: #6abf69; }
      .harness-drawer-row .status-3xx { color: #5bc0de; }
      .harness-drawer-row .status-4xx { color: #f0ad4e; }
      .harness-drawer-row .status-5xx,
      .harness-drawer-row .status-0   { color: #d9534f; }
      .harness-drawer-detail {
        padding: 6px 0 0 0; border-top: 1px dashed rgba(255,255,255,0.1);
        margin-top: 4px; font-size: 11px;
      }
      .harness-drawer-detail pre {
        background: rgba(0,0,0,0.25); color: inherit; padding: 6px 8px; border: 0;
        border-radius: 3px; max-height: 240px; overflow: auto; font-size: 11px;
      }
      body.theme-light .harness-drawer-detail pre { background: rgba(0,0,0,0.05); }
      .harness-drawer-empty { opacity: 0.55; padding: 12px; text-align: center; }
      .harness-drawer-filter {
        background: #2b313a; color: #dcdcdc; border: 1px solid #3a4049;
        padding: 1px 6px; border-radius: 3px; font-size: 11px; width: 160px;
      }
      body.theme-light .harness-drawer-filter { background: #fff; color: #1b1f24; border-color: #c0c5cc; }
      body.has-drawer-open { padding-bottom: 50vh; }
    </style>
  </head>
  <body>
    <div class="harness-bar">
      <strong>Widget dev harness</strong>
      <label>
        Widget
        <select id="widget-select"></select>
      </label>
      <label>
        Context
        <select id="ctx">
          <option value="dashboard">Dashboard</option>
          <option value="viewpanel">View Panel</option>
          <option value="drawer">Drawer</option>
        </select>
      </label>
      <label id="vp-fields" style="display: none">
        module <input id="vp-module" value="alerts" size="10" />
        id <input id="vp-id" size="36" placeholder="uuid" />
      </label>
      <button id="reload" class="btn btn-sm btn-primary" style="padding: 2px 10px">
        Reload
      </button>
      <label>
        Theme
        <select id="harness-theme">
          <option value="dark" selected>dark</option>
          <option value="light">light</option>
          <option value="navy">navy</option>
        </select>
      </label>
      <label>
        <input type="checkbox" id="load-fsr-css" />
        Load FortiSOAR CSS
      </label>
      <button id="edit-config" class="btn btn-sm btn-default" style="padding: 2px 10px"
              title="Open the widget's edit.html in a modal and update its config">
        Edit config
      </button>
      <button id="package-toggle" class="btn btn-sm btn-default" style="padding: 2px 10px">
        Package
      </button>
      <span class="spacer"></span>
      <button id="drawer-toggle-btn" class="btn btn-sm btn-default" style="padding: 2px 10px"
              title="Toggle the debug drawer (Errors / Network / Console)">
        Debug <span id="drawer-error-count" class="harness-drawer-badge" style="display:none">0</span>
      </button>
      <span style="opacity: 0.6; font-size: 11px">proxy → FortiSOAR</span>
    </div>

    <div id="package-panel" class="harness-package-panel">
      <span>current <span id="pkg-current" class="current-version">—</span></span>
      <div class="group">
        <label>new version <input id="pkg-version" size="10" /></label>
      </div>
      <div class="group">
        bump
        <button id="pkg-bump-patch" class="btn btn-xs btn-default" type="button">patch</button>
        <button id="pkg-bump-minor" class="btn btn-xs btn-default" type="button">minor</button>
        <button id="pkg-bump-major" class="btn btn-xs btn-default" type="button">major</button>
      </div>
      <button id="pkg-build" class="btn btn-sm btn-success" type="button" style="padding: 2px 10px">
        Package &amp; Download
      </button>
      <button id="pkg-install" class="btn btn-sm btn-primary" type="button" style="padding: 2px 10px"
              title="Package, upload, and publish to FortiSOAR in one shot">
        Install to SOAR
      </button>
      <span id="pkg-status" style="opacity: 0.75"></span>
    </div>

    <div id="harness-toasts" class="harness-toasts"></div>

    <div id="lint-warnings"></div>

    <div id="harness-frame" class="harness-frame">
      <div id="record-header" class="harness-record-header" style="display: none"></div>
      <div id="widget-host">
        <div class="harness-empty">loading…</div>
      </div>
    </div>

    <div id="edit-modal-backdrop" class="harness-modal-backdrop">
      <div class="harness-modal">
        <div class="harness-modal-head">
          <span>Edit widget config</span>
          <button id="edit-modal-close" class="btn btn-xs btn-default" type="button">close</button>
        </div>
        <div id="edit-modal-body" class="harness-modal-body"></div>
        <div class="harness-modal-foot">
          <span id="edit-modal-status" style="opacity: 0.7; font-size: 12px; margin-right: auto"></span>
          <button id="edit-modal-cancel" class="btn btn-sm btn-default" type="button">Cancel</button>
          <button id="edit-modal-save" class="btn btn-sm btn-primary" type="button">Save</button>
        </div>
      </div>
    </div>

    <div id="harness-drawer" class="harness-drawer">
      <div class="harness-drawer-bar" id="drawer-bar">
        <span class="harness-drawer-tab active" data-tab="errors">
          Errors <span id="tab-badge-errors" class="harness-drawer-badge" style="display:none">0</span>
        </span>
        <span class="harness-drawer-tab" data-tab="network">
          Network <span id="tab-badge-network" class="harness-drawer-badge muted" style="display:none">0</span>
        </span>
        <span class="harness-drawer-tab" data-tab="console">
          Console <span id="tab-badge-console" class="harness-drawer-badge muted" style="display:none">0</span>
        </span>
        <span class="harness-drawer-spacer"></span>
        <input id="drawer-filter" class="harness-drawer-filter" placeholder="filter…" />
        <label style="display:flex;gap:4px;align-items:center;font-size:11px;opacity:0.85;">
          <input type="checkbox" id="drawer-verbose" /> verbose
        </label>
        <button id="drawer-clear" class="harness-drawer-action" type="button">clear</button>
        <button id="drawer-collapse" class="harness-drawer-action" type="button">▾</button>
      </div>
      <div class="harness-drawer-body" id="drawer-body"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>
    <script src="/lib/harnessUtils.js"></script>
    <script src="/lib/harnessDrawer.js"></script>

    <script>
      function setEmpty(host, text) {
        while (host.firstChild) host.removeChild(host.firstChild);
        const d = document.createElement("div");
        d.className = "harness-empty";
        d.textContent = text;
        host.appendChild(d);
      }

      (async function () {
        const widgetSelect = document.getElementById("widget-select");
        const ctxSel = document.getElementById("ctx");
        const vpFields = document.getElementById("vp-fields");
        const modEl = document.getElementById("vp-module");
        const idEl = document.getElementById("vp-id");
        const loadCssEl = document.getElementById("load-fsr-css");
        const host = document.getElementById("widget-host");

        const HU = window.HarnessUtils;
        const frame = document.getElementById("harness-frame");
        const recordHeader = document.getElementById("record-header");
        const lintWarningsHost = document.getElementById("lint-warnings");

        // Render non-blocking lint warnings above the widget. Errors are
        // rendered as a separate red banner inside #widget-host because they
        // *do* block bootstrap.
        function renderLintWarnings(widget) {
          while (lintWarningsHost.firstChild) lintWarningsHost.removeChild(lintWarningsHost.firstChild);
          const warns = (widget.lint && widget.lint.warnings) || [];
          if (warns.length === 0) return;
          const div = document.createElement("div");
          div.className = "harness-lint-warn";
          const lines = warns.map((w) => "⚠ " + (w.code ? "[" + w.code + "] " : "") + w.message);
          div.textContent = lines.join("\n");
          div.style.whiteSpace = "pre-wrap";
          lintWarningsHost.appendChild(div);
        }

        function renderLintBanner(hostEl, widget, errors) {
          const err = document.createElement("div");
          err.style.cssText = "padding:16px;border:1px solid #c33;background:#fee;color:#900;font-family:ui-monospace,monospace;white-space:pre-wrap;border-radius:4px;";
          const head = document.createElement("div");
          head.style.cssText = "font-weight:600;margin-bottom:8px;";
          head.textContent = "Lint blocked widget bootstrap (" + errors.length + " issue" + (errors.length === 1 ? "" : "s") + ")";
          err.appendChild(head);
          for (const e of errors) {
            const row = document.createElement("div");
            row.style.cssText = "margin:4px 0;";
            row.textContent = "• [" + e.code + "] " + e.message;
            err.appendChild(row);
          }
          if (errors.some((e) => e.fixable)) {
            const fixBtn = document.createElement("button");
            fixBtn.textContent = "Try auto-fix";
            fixBtn.className = "btn btn-sm btn-default";
            fixBtn.style.cssText = "margin-top:12px;";
            fixBtn.addEventListener("click", async () => {
              fixBtn.disabled = true;
              const orig = fixBtn.textContent;
              fixBtn.textContent = "fixing…";
              try {
                const r = await fetch("/_fsr/fix-controllers/" + widget.id, { method: "POST" });
                const data = await r.json();
                if (!r.ok) throw new Error(data.error || ("HTTP " + r.status));
                if (!data.fixes || data.fixes.length === 0) {
                  fixBtn.textContent = "no changes (none of the issues were of the auto-fixable kind)";
                  fixBtn.disabled = false;
                  return;
                }
                fixBtn.textContent = "fixed — reloading…";
                // SSE will trigger soft-remount; if not, fall back to reload.
                setTimeout(() => location.reload(), 600);
              } catch (e) {
                fixBtn.disabled = false;
                fixBtn.textContent = "auto-fix failed: " + e.message;
                setTimeout(() => { fixBtn.textContent = orig; }, 3000);
              }
            });
            err.appendChild(fixBtn);
          }
          hostEl.appendChild(err);
        }

        ctxSel.value = localStorage.getItem("harness.ctx") || "dashboard";
        modEl.value = localStorage.getItem("harness.module") || "alerts";
        idEl.value = localStorage.getItem("harness.id") || "";
        const savedFsrCss = localStorage.getItem("harness.fsrCss");
        loadCssEl.checked = savedFsrCss === null ? true : savedFsrCss === "1";
        const initialTheme = localStorage.getItem("harness.theme") || "dark";
        document.getElementById("harness-theme").value = initialTheme;
        document.body.classList.toggle("theme-dark", initialTheme !== "light");
        document.body.classList.toggle("theme-light", initialTheme === "light");
        function ctxNeedsRecord(ctx) { return ctx === "viewpanel" || ctx === "drawer"; }
        vpFields.style.display = ctxNeedsRecord(ctxSel.value) ? "" : "none";
        ctxSel.addEventListener("change", () => {
          vpFields.style.display = ctxNeedsRecord(ctxSel.value) ? "" : "none";
        });

        const pkgPanel = document.getElementById("package-panel");
        const pkgToggle = document.getElementById("package-toggle");
        const pkgCurrent = document.getElementById("pkg-current");
        const pkgVersion = document.getElementById("pkg-version");
        const pkgBuild = document.getElementById("pkg-build");
        const pkgStatus = document.getElementById("pkg-status");

        function bumpParts(v, part) {
          const parts = String(v || "0.0.0").split(".").map((n) => parseInt(n, 10) || 0);
          while (parts.length < 3) parts.push(0);
          if (part === "major") { parts[0]++; parts[1] = 0; parts[2] = 0; }
          else if (part === "minor") { parts[1]++; parts[2] = 0; }
          else { parts[2]++; }
          return parts.slice(0, 3).join(".");
        }

        // After a successful package/install that bumps the version, the server's
        // widgetsById map hot-reloads to the new ID but the browser's <select> still
        // holds the old value. Patch the option in place so subsequent requests
        // (/_fsr/install/<id>, /_fsr/package/<id>) use the correct ID.
        function updateWidgetSelectId(oldId, newId) {
          if (!oldId || !newId || oldId === newId) return;
          const opt = Array.from(widgetSelect.options).find((o) => o.value === oldId);
          if (opt) {
            opt.value = newId;
            opt.textContent = opt.textContent.replace(oldId, newId);
          }
          if (widgetSelect.value === oldId) widgetSelect.value = newId;
        }

        async function loadPackageInfo() {
          pkgStatus.textContent = "";
          try {
            const id = widgetSelect.value;
            const r = await fetch("/_fsr/package/" + encodeURIComponent(id) + "/info");
            if (!r.ok) throw new Error("HTTP " + r.status);
            const info = await r.json();
            pkgCurrent.textContent = info.version;
            pkgVersion.value = info.version;
          } catch (e) {
            pkgCurrent.textContent = "?";
            pkgStatus.textContent = "info failed: " + e.message;
          }
        }

        pkgToggle.addEventListener("click", async () => {
          pkgPanel.classList.toggle("open");
          if (pkgPanel.classList.contains("open")) await loadPackageInfo();
        });

        widgetSelect.addEventListener("change", () => {
          if (pkgPanel.classList.contains("open")) loadPackageInfo();
        });

        document.getElementById("pkg-bump-patch").addEventListener("click", () => {
          pkgVersion.value = bumpParts(pkgCurrent.textContent, "patch");
        });
        document.getElementById("pkg-bump-minor").addEventListener("click", () => {
          pkgVersion.value = bumpParts(pkgCurrent.textContent, "minor");
        });
        document.getElementById("pkg-bump-major").addEventListener("click", () => {
          pkgVersion.value = bumpParts(pkgCurrent.textContent, "major");
        });

        const pkgInstall = document.getElementById("pkg-install");
        pkgInstall.addEventListener("click", async () => {
          const id = widgetSelect.value;
          const requested = (pkgVersion.value || "").trim();
          const body = {};
          if (requested && /^\d+(\.\d+){0,2}$/.test(requested)) {
            body.version = requested;
          } else if (requested) {
            pkgStatus.textContent = "invalid version";
            return;
          }
          pkgInstall.disabled = true;
          pkgBuild.disabled = true;
          pkgStatus.textContent = "uploading…";
          try {
            const r = await fetch("/_fsr/install/" + encodeURIComponent(id), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            const payload = await r.json().catch(() => ({}));
            if (!r.ok) {
              if (payload.lint && payload.lint.errors) {
                const codes = payload.lint.errors.map((e) => e.code).join(", ");
                throw new Error("lint blocked install: " + codes + " — see the widget panel");
              }
              throw new Error(payload.error || "HTTP " + r.status);
            }
            const newInstallId = payload.name + "-" + payload.version;
            updateWidgetSelectId(id, newInstallId);
            pkgCurrent.textContent = payload.version;
            pkgVersion.value = payload.version;
            pkgStatus.textContent =
              "installed " + payload.name + "-" + payload.version + " (" + payload.uuid.slice(0, 8) + ")";
          } catch (e) {
            pkgStatus.textContent = "install failed: " + e.message;
          } finally {
            pkgInstall.disabled = false;
            pkgBuild.disabled = false;
          }
        });

        pkgBuild.addEventListener("click", async () => {
          const id = widgetSelect.value;
          const requested = (pkgVersion.value || "").trim();
          if (!/^\d+(\.\d+){0,2}$/.test(requested)) {
            pkgStatus.textContent = "invalid version";
            return;
          }
          pkgBuild.disabled = true;
          pkgStatus.textContent = "packaging…";
          try {
            const r = await fetch("/_fsr/package/" + encodeURIComponent(id), {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ version: requested }),
            });
            if (!r.ok) {
              let msg = "HTTP " + r.status;
              try {
                const err = await r.json();
                if (err && err.lint && err.lint.errors) {
                  msg = "lint blocked package: " + err.lint.errors.map((e) => e.code).join(", ");
                } else if (err && err.error) msg = err.error;
              } catch (_) {}
              throw new Error(msg);
            }
            const cd = r.headers.get("Content-Disposition") || "";
            const m = cd.match(/filename="([^"]+)"/);
            const filename = m ? m[1] : id + ".tgz";
            const blob = await r.blob();
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            const newVersion = r.headers.get("X-Package-Version") || requested;
            const widgetName = id.replace(/-\d+(?:\.\d+)*$/, "");
            updateWidgetSelectId(id, widgetName + "-" + newVersion);
            pkgCurrent.textContent = newVersion;
            pkgStatus.textContent = "built " + filename;
          } catch (e) {
            pkgStatus.textContent = "failed: " + e.message;
          } finally {
            pkgBuild.disabled = false;
          }
        });

        document.getElementById("reload").addEventListener("click", () => {
          localStorage.setItem("harness.widget", widgetSelect.value);
          localStorage.setItem("harness.ctx", ctxSel.value);
          localStorage.setItem("harness.module", modEl.value);
          localStorage.setItem("harness.id", idEl.value);
          localStorage.setItem("harness.fsrCss", loadCssEl.checked ? "1" : "0");
          localStorage.setItem("harness.theme", document.getElementById("harness-theme").value);
          location.reload();
        });

        function loadScript(src) {
          return new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = src;
            s.onload = () => resolve();
            s.onerror = () => reject(new Error("failed to load " + src));
            document.head.appendChild(s);
          });
        }

        // In SOAR, window.monaco is preloaded during app bootstrap
        // (initMonacoEditorService). Our proxy forwards /node_modules/... to
        // the SOAR host, so we can load Monaco's AMD bundle the same way
        // here. Only needs to run once per tab; idempotent on repeat calls.
        async function preloadMonaco() {
          if (window.monaco) return window.monaco;
          if (window.__harnessMonacoPromise) return window.__harnessMonacoPromise;
          const VS = "/node_modules/monaco-editor/min/vs";
          window.__harnessMonacoPromise = (async () => {
            if (!window.require) await loadScript(VS + "/loader.js");
            return new Promise((resolve, reject) => {
              try {
                window.require.config({
                  paths: { vs: VS },
                  "vs/nls": { availableLanguages: {} },
                });
                window.require(
                  ["vs/editor/editor.main"],
                  () => resolve(window.monaco),
                  (err) =>
                    reject(
                      new Error(
                        "Monaco require(editor.main) failed: " +
                          ((err && (err.message || err.toString())) || "unknown")
                      )
                    )
                );
              } catch (e) {
                reject(e);
              }
            });
          })();
          return window.__harnessMonacoPromise;
        }

        async function injectFsrStylesheets() {
          try {
            const r = await fetch("/_fsr/stylesheets");
            if (!r.ok) {
              console.warn("stylesheets endpoint failed:", r.status);
              return;
            }
            const { stylesheets } = await r.json();
            for (const href of stylesheets || []) {
              const link = document.createElement("link");
              link.rel = "stylesheet";
              link.href = href;
              document.head.appendChild(link);
            }
            console.log(`injected ${(stylesheets || []).length} FortiSOAR stylesheets`);
          } catch (e) {
            console.warn("failed to fetch FortiSOAR stylesheets:", e);
          }
        }

        const widgetsRes = await fetch("/_fsr/widgets").then((r) => r.json());
        const widgets = widgetsRes.widgets || [];
        if (widgets.length === 0) {
          setEmpty(
            host,
            "No widgets found in widgets-src/. Add a folder with info.json, view.html, and view.controller.js, then restart the server."
          );
          return;
        }

        const savedId = localStorage.getItem("harness.widget");
        const currentId =
          (widgets.find((w) => w.id === savedId) || widgets[0]).id;
        for (const w of widgets) {
          const opt = document.createElement("option");
          opt.value = w.id;
          opt.textContent = w.title + " (" + w.id + ")";
          opt.selected = w.id === currentId;
          widgetSelect.appendChild(opt);
        }
        const current = widgets.find((w) => w.id === currentId);

        window.__HARNESS_THEME_ID = document.getElementById("harness-theme").value;

        if (loadCssEl.checked) {
          await injectFsrStylesheets();
        }

        await loadScript("/harness.module.js");
        await preloadMonaco();
        await loadScript("/" + current.id + "/view.controller.js");

        function setRecordHeader(parts) {
          while (recordHeader.firstChild) recordHeader.removeChild(recordHeader.firstChild);
          for (const p of parts) {
            if (typeof p === "string") {
              recordHeader.appendChild(document.createTextNode(p));
            } else {
              const span = document.createElement("span");
              if (p.cls) span.className = p.cls;
              span.textContent = p.text;
              recordHeader.appendChild(span);
            }
          }
        }

        async function applyContext(ctx) {
          frame.classList.remove("ctx-dashboard", "ctx-viewpanel", "ctx-drawer");
          frame.classList.add("ctx-" + ctx);
          if (!ctxNeedsRecord(ctx)) {
            recordHeader.style.display = "none";
            setRecordHeader([]);
            return null;
          }
          const m = (modEl.value || "").trim();
          const i = (idEl.value || "").trim();
          recordHeader.style.display = "";
          if (!m || !i) {
            setRecordHeader([
              { cls: "err", text: "no record loaded" },
              " — fill module and id in the toolbar",
            ]);
            return null;
          }
          setRecordHeader(["loading " + m + "/" + i + "…"]);
          try {
            const r = await fetch(HU.recordFetchPath(m, i, true));
            if (!r.ok) throw new Error("HTTP " + r.status);
            const rec = await r.json();
            const label = (rec && (rec.name || rec["@id"] || rec.uuid)) || i;
            setRecordHeader(["record: " + m + " / " + String(label)]);
            return rec;
          } catch (e) {
            setRecordHeader([{ cls: "err", text: "record fetch failed: " + e.message }]);
            return null;
          }
        }

        let currentInjector = null;
        async function mountWidget() {
          const ctx = ctxSel.value;
          const record = await applyContext(ctx);

          let savedConfig = null;
          try {
            const raw = localStorage.getItem(HU.configStorageKey(current.id));
            if (raw) savedConfig = JSON.parse(raw);
          } catch (_) {}

          window.__HARNESS_RECORD = record || undefined;
          window.__HARNESS_CONFIG = HU.mergeConfig(
            { title: current.title, module: modEl.value || "alerts", defaultTemplate: "" },
            savedConfig
          );
          window.__HARNESS_STATE = HU.stateForContext(ctx, {
            module: modEl.value,
            id: idEl.value,
          });

          if (currentInjector) {
            try { currentInjector.get("$rootScope").$destroy(); } catch (_) {}
          }
          while (host.firstChild) host.removeChild(host.firstChild);

          const ctrlName = HU.deriveControllerName(current.name, current.version);
          renderLintWarnings(current);
          const lintErrors = (current.lint && current.lint.errors) || [];
          if (lintErrors.length > 0) {
            renderLintBanner(host, current, lintErrors);
            return;
          }
          const wrap = document.createElement("div");
          wrap.setAttribute("ng-controller", ctrlName);
          const inc = document.createElement("div");
          inc.setAttribute("ng-include", "'/" + current.id + "/view.html'");
          wrap.appendChild(inc);
          host.appendChild(wrap);
          currentInjector = angular.bootstrap(wrap, ["cybersponse"]);

          const $rootScope = currentInjector.get("$rootScope");
          window.__harnessApplyTheme = function (id) {
            document.body.classList.toggle("theme-dark", id !== "light");
            document.body.classList.toggle("theme-light", id === "light");
            if ($rootScope.$$phase) {
              $rootScope.theme = { id: id };
            } else {
              $rootScope.$apply(function () { $rootScope.theme = { id: id }; });
            }
          };
        }

        await mountWidget();

        const themeSelect = document.getElementById("harness-theme");
        themeSelect.addEventListener("change", function () {
          if (window.__harnessApplyTheme) window.__harnessApplyTheme(themeSelect.value);
        });

        // ---------------- Edit-config modal ----------------
        const editBtn = document.getElementById("edit-config");
        const modalBackdrop = document.getElementById("edit-modal-backdrop");
        const modalBody = document.getElementById("edit-modal-body");
        const modalStatus = document.getElementById("edit-modal-status");
        const modalSave = document.getElementById("edit-modal-save");
        const modalCancel = document.getElementById("edit-modal-cancel");
        const modalClose = document.getElementById("edit-modal-close");
        let editInjector = null;

        function closeEditModal() {
          modalBackdrop.classList.remove("open");
          if (editInjector) {
            try { editInjector.get("$rootScope").$destroy(); } catch (_) {}
            editInjector = null;
          }
          while (modalBody.firstChild) modalBody.removeChild(modalBody.firstChild);
          modalStatus.textContent = "";
        }

        editBtn.addEventListener("click", async () => {
          modalStatus.textContent = "loading edit form…";
          modalBackdrop.classList.add("open");
          try {
            await loadScript("/" + current.id + "/edit.controller.js");
            const editCtrlName = HU.deriveEditControllerName(current.name, current.version);
            const editRegistered = current.editControllers || [];
            if (editRegistered.length > 0 && editRegistered.indexOf(editCtrlName) === -1) {
              while (modalBody.firstChild) modalBody.removeChild(modalBody.firstChild);
              const err = document.createElement("div");
              err.style.cssText = "padding:16px;border:1px solid #c33;background:#fee;color:#900;font-family:monospace;white-space:pre-wrap;";
              err.textContent =
                "Edit controller mismatch.\n\n" +
                "Expected (from info.json version " + current.version + "): " + editCtrlName + "\n" +
                "Registered in edit.controller.js: " + editRegistered.join(", ") + "\n\n" +
                "Either bump the controller name to match the version, or revert info.json.";
              modalBody.appendChild(err);
              modalStatus.textContent = "";
              return;
            }

            let saved = null;
            try {
              const raw = localStorage.getItem(HU.configStorageKey(current.id));
              if (raw) saved = JSON.parse(raw);
            } catch (_) {}
            window.__HARNESS_CONFIG = HU.mergeConfig(window.__HARNESS_CONFIG, saved);

            const editWrap = document.createElement("div");
            editWrap.setAttribute("ng-controller", editCtrlName);
            const inc = document.createElement("div");
            inc.setAttribute("ng-include", "'/" + current.id + "/edit.html'");
            editWrap.appendChild(inc);
            while (modalBody.firstChild) modalBody.removeChild(modalBody.firstChild);
            modalBody.appendChild(editWrap);
            editInjector = angular.bootstrap(editWrap, ["cybersponse"]);
            modalStatus.textContent = "";
          } catch (e) {
            modalStatus.textContent = "open failed: " + e.message;
          }
        });

        modalCancel.addEventListener("click", closeEditModal);
        modalClose.addEventListener("click", closeEditModal);
        modalBackdrop.addEventListener("click", (e) => {
          if (e.target === modalBackdrop) closeEditModal();
        });

        modalSave.addEventListener("click", async () => {
          if (!editInjector) return closeEditModal();
          modalStatus.textContent = "saving…";
          try {
            const wrap = modalBody.firstChild;
            const scope =
              (wrap && wrap.firstChild && angular.element(wrap.firstChild).scope()) ||
              (wrap && angular.element(wrap).scope());
            const cfg = scope && scope.config;
            if (cfg && typeof cfg === "object") {
              localStorage.setItem(HU.configStorageKey(current.id), JSON.stringify(cfg));
            }
            closeEditModal();
            await mountWidget();
          } catch (e) {
            modalStatus.textContent = "save failed: " + e.message;
          }
        });

        // Soft-remount on file change: refresh widget metadata, reload the
        // controller script with a cache-bust, and re-bootstrap. Avoids the
        // full page reload so DevTools state, drawer entries, and scroll
        // position survive an iteration. Only fires for the currently
        // selected widget — other widgets just have their entries refreshed
        // in the metadata cache.
        async function softRemount(reason) {
          try {
            const refreshed = await fetch("/_fsr/widgets").then((r) => r.json());
            const next = (refreshed.widgets || []).find((w) => w.id === current.id || w.name === current.name);
            if (!next) return;
            // Mutate `current` in place so existing closures keep working.
            Object.assign(current, next);
            // Patch the <select> if id changed (version bump while we watched).
            updateWidgetSelectId(widgetSelect.value, current.id);
            await loadScript("/" + current.id + "/view.controller.js?v=" + Date.now());
            await mountWidget();
            console.log("[harness] soft-remount: " + (reason || "change"));
          } catch (e) {
            console.error("[harness] soft-remount failed:", e);
          }
        }

        // SSE wiring: drives soft-remount on file change and pipes proxy log
        // entries into the debug drawer. EventSource auto-reconnects, so we
        // don't need to handle disconnects explicitly.
        try {
          const es = new EventSource("/_fsr/events");
          let remountTimer = null;
          es.addEventListener("message", function (ev) {
            let m;
            try { m = JSON.parse(ev.data); } catch (_) { return; }
            if (m.type === "widget-change") {
              if (m.id === current.id || m.oldId === current.id || m.id.split("-")[0] === current.name) {
                clearTimeout(remountTimer);
                remountTimer = setTimeout(() => softRemount(m.file), 120);
              }
            } else if (m.type === "harness-reload") {
              clearTimeout(remountTimer);
              remountTimer = setTimeout(() => softRemount("harness.module.js"), 120);
            } else if (m.type === "proxy") {
              if (window.__harnessProxyEvent) window.__harnessProxyEvent(m.entry);
            } else if (m.type === "proxy-clear") {
              if (window.__harnessClearNetwork) window.__harnessClearNetwork();
            } else if (m.type === "verbose") {
              if (window.__harnessSetVerboseUI) window.__harnessSetVerboseUI(m.verbose);
            } else if (m.type === "hello") {
              if (window.__harnessSetVerboseUI) window.__harnessSetVerboseUI(m.verbose);
            }
          });
          es.addEventListener("error", () => { /* EventSource reconnects */ });
        } catch (e) {
          console.warn("[harness] SSE unavailable:", e && e.message);
        }
        if (window.__harnessHydrateProxy) window.__harnessHydrateProxy();

        // Re-mount when the user changes context or record without reloading.
        ctxSel.addEventListener("change", () => mountWidget().catch(console.error));
        document.getElementById("vp-module").addEventListener("change", () => {
          if (ctxNeedsRecord(ctxSel.value)) mountWidget().catch(console.error);
        });
        document.getElementById("vp-id").addEventListener("change", () => {
          if (ctxNeedsRecord(ctxSel.value)) mountWidget().catch(console.error);
        });
      })().catch((e) => {
        setEmpty(
          document.getElementById("widget-host"),
          "harness boot failed: " + (e && e.message ? e.message : String(e))
        );
        console.error(e);
      });
    </script>
  </body>
</html>
